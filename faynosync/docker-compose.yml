services:
  api:
    image: ku9nov/faynosync:v1.5.4
    container_name: faynosync-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-9000}:9000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      s3:
        condition: service_healthy
    networks:
      - faynosync

  dashboard:
    image: ku9nov/faynosync-dashboard:latest
    platform: linux/amd64
    container_name: faynosync-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=${API_URL:-http://localhost:9000}
      - VITE_PORT=${VITE_PORT:-3000}
      - __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-localhost}
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "3000"]
    depends_on:
      - api
    networks:
      - faynosync

  db:
    image: mongo:7
    container_name: faynosync-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faynosync

  cache:
    image: redis:7-alpine
    container_name: faynosync-cache
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - faynosync

  s3:
    image: minio/minio
    container_name: faynosync-s3
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server --address 0.0.0.0:9000 --console-address :9001 /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - faynosync

  s3-init:
    image: minio/mc
    container_name: faynosync-s3-init
    depends_on:
      s3:
        condition: service_healthy
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set faynosync http://s3:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      /usr/bin/mc mb --ignore-existing faynosync/${S3_BUCKET_NAME_PRIVATE};
      /usr/bin/mc mb --ignore-existing faynosync/${S3_BUCKET_NAME};
      /usr/bin/mc anonymous set download faynosync/${S3_BUCKET_NAME};
      echo 'MinIO buckets initialized.';
      "
    networks:
      - faynosync

volumes:
  mongo_data:
  redis_data:
  minio_data:

networks:
  faynosync:
    driver: bridge
