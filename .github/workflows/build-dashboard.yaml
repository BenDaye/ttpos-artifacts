name: Build Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main, release]
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "yarn.lock"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "Dockerfile"
      - "nginx.conf"
      - "docker-entrypoint.sh"
      - ".github/workflows/build-dashboard.yaml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: faynosync-dashboard
    steps:
      - name: 显示构建信息
        run: |
          echo "========================================="
          echo "Dashboard 构建信息"
          echo "========================================="
          echo "分支: ${{ github.ref_name }}"
          echo "触发: ${{ github.event_name }}"
          echo "镜像: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}"
          echo "========================================="

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 获取 Commit 信息
        id: git_info
        run: |
          echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "COMMIT_MSG=$(git log -1 --pretty=format:%s)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/release' || github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short
            type=ref,event=branch

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 构建完成总结
        if: always()
        run: |
          echo "========================================="
          echo "Dashboard 构建完成"
          echo "========================================="
          echo "Commit: ${{ steps.git_info.outputs.COMMIT_SHA }}"
          echo "镜像标签:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "========================================="
