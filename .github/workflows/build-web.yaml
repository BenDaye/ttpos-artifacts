name: Build Web

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "构建分支 (e.g. release, new-test, feature/xxx)"
        required: true
        type: string
        default: "new-test"
      env:
        description: "选择构建环境"
        required: true
        type: choice
        options:
          - "prod"
          - "test"
          - "dev"
        default: "prod"
      package:
        description: "选择要构建的应用端"
        required: true
        type: choice
        options:
          - all
          - menu
          - mobile
          - member
        default: "all"
      base_url:
        description: "选择API基础URL"
        required: true
        type: choice
        default: "https://ttpos-test1.ttpos.com/api/v1"
        options:
          - "https://ttpos-test1.ttpos.com/api/v1"
          - "https://api.ttpos.com/api/v1"
          - "https://ttpos-pro.keli.vip/api/v1"
      base_ws_url:
        description: "选择WebSocket基础URL"
        required: true
        type: choice
        default: "wss://ttpos-test1.ttpos.com/ws"
        options:
          - "wss://ttpos-test1.ttpos.com/ws"
          - "wss://api.ttpos.com/ws"
          - "wss://ttpos-pro.keli.vip/ws"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [menu, mobile, member]
        include:
          - package: menu
            image_name: ttpos-web-menu
          - package: mobile
            image_name: ttpos-web-mobile
          - package: member
            image_name: ttpos-web-member
    env:
      REGISTRY: ghcr.io
    steps:
      - name: 检查是否需要构建此应用端
        id: check
        run: |
          if [ "${{ inputs.package }}" = "all" ] || [ "${{ inputs.package }}" = "${{ matrix.package }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "跳过 ${{ matrix.package }} (选择的应用端: ${{ inputs.package }})"
          fi

      - name: 设置镜像所有者（GHCR 要求小写）
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 显示构建信息
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "========================================="
          echo "构建信息"
          echo "========================================="
          echo "应用端: ${{ matrix.package }}"
          echo "分支: ${{ inputs.branch }}"
          echo "环境: ${{ inputs.env }}"
          echo "API URL: ${{ inputs.base_url }}"
          echo "WebSocket URL: ${{ inputs.base_ws_url }}"
          echo "镜像仓库: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}"
          echo "========================================="

      - name: Checkout the code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: innet8/ttpos-flutter
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ inputs.branch }}

      - name: 获取 Commit ID
        if: steps.check.outputs.should_run == 'true'
        id: git_info
        run: |
          echo "COMMIT_ID=$(git log -1 --pretty=format:%h -- .)" >> $GITHUB_OUTPUT

      - name: Set up Flutter
        if: steps.check.outputs.should_run == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          flutter-version: "3.27.3"

      - name: Install Melos
        if: steps.check.outputs.should_run == 'true'
        run: |
          flutter --version
          dart pub global activate melos

      - name: Melos Init
        if: steps.check.outputs.should_run == 'true'
        env:
          PUB_HOSTED_URL: https://pub.flutter-io.cn
          FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
        run: |
          melos bs
          melos run env:setup -- --env=${{ inputs.env }}

      - name: 生成环境变量文件
        if: steps.check.outputs.should_run == 'true'
        env:
          API_URL: ${{ inputs.base_url }}
          WS_URL: ${{ inputs.base_ws_url }}
        run: |
          # 根据 env 输入选择对应的环境文件（与 scripts/utils.dart getEnv() 保持一致）
          case "${{ inputs.env }}" in
            dev)  ENV_SUFFIX="development" ;;
            test) ENV_SUFFIX="test" ;;
            *)    ENV_SUFFIX="production" ;;
          esac

          ENV_PATH="apps/${{ matrix.package }}/.env.${ENV_SUFFIX}.local"
          ENV_TEMPLATE="apps/${{ matrix.package }}/.env.${ENV_SUFFIX}"

          if [ ! -f "$ENV_PATH" ]; then
            if [ -f "$ENV_TEMPLATE" ]; then
              cp "$ENV_TEMPLATE" "$ENV_PATH"
            else
              touch "$ENV_PATH"
            fi
          fi

          sed -i "s|^API_BASE_URL=.*|API_BASE_URL=${API_URL}|" "$ENV_PATH"
          sed -i "s|^WS_BASE_URL=.*|WS_BASE_URL=${WS_URL}|" "$ENV_PATH"

          # 保存 ENV_SUFFIX 供后续步骤使用
          echo "ENV_SUFFIX=$ENV_SUFFIX" >> $GITHUB_ENV

          echo "--- 环境变量文件内容 ($ENV_PATH) ---"
          cat "$ENV_PATH"

      - name: 设置 SENTRY_DSN（仅 release 分支）
        if: steps.check.outputs.should_run == 'true' && inputs.branch == 'release'
        env:
          SENTRYDSN_MENU: ${{ secrets.SENTRYDSN_MENU }}
          SENTRYDSN_MOBILE: ${{ secrets.SENTRYDSN_MOBILE }}
          SENTRYDSN_MEMBER: ${{ secrets.SENTRYDSN_MEMBER }}
        run: |
          ENV_PATH="apps/${{ matrix.package }}/.env.${{ env.ENV_SUFFIX }}.local"
          case "${{ matrix.package }}" in
            menu)   DSN="$SENTRYDSN_MENU" ;;
            mobile) DSN="$SENTRYDSN_MOBILE" ;;
            member) DSN="$SENTRYDSN_MEMBER" ;;
          esac
          sed -i "s|^SENTRY_DSN=.*|SENTRY_DSN=${DSN}|" "$ENV_PATH"

      - name: Build Web
        if: steps.check.outputs.should_run == 'true'
        run: |
          dart run ./scripts/build_web.dart --package=${{ matrix.package }}

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        if: steps.check.outputs.should_run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        if: steps.check.outputs.should_run == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable=${{ inputs.branch == 'release' }}
            type=raw,value=test-latest,enable=${{ inputs.branch != 'release' }}
            type=raw,value=${{ steps.git_info.outputs.COMMIT_ID }},enable=${{ inputs.branch == 'release' }}
            type=raw,value=test-${{ steps.git_info.outputs.COMMIT_ID }},enable=${{ inputs.branch != 'release' }}

      - name: 构建并推送 Docker 镜像
        if: steps.check.outputs.should_run == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: Dockerfile.${{ matrix.package }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 构建完成总结
        if: always() && steps.check.outputs.should_run == 'true'
        run: |
          echo "========================================="
          echo "构建任务完成"
          echo "========================================="
          echo "应用端: ${{ matrix.package }}"
          echo "分支: ${{ inputs.branch }}"
          echo "环境: ${{ inputs.env }}"
          echo "镜像标签:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "========================================="
