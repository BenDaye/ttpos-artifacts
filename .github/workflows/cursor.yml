name: Cursor Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  cursor:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@cursor')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@cursor')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@cursor')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@cursor') || contains(github.event.issue.title, '@cursor')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> $GITHUB_PATH

      - name: Determine prompt
        id: prompt
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const eventName = context.eventName;
            let prompt = '';
            if (eventName === 'issue_comment' || eventName === 'pull_request_review_comment') {
              prompt = context.payload.comment.body;
            } else if (eventName === 'pull_request_review') {
              prompt = context.payload.review.body;
            } else if (eventName === 'issues') {
              prompt = `${context.payload.issue.title}\n\n${context.payload.issue.body}`;
            }
            return prompt;

      - name: Run Cursor Agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_PROMPT: ${{ steps.prompt.outputs.result }}
        run: |
          agent --yolo -p "$AGENT_PROMPT" --model opus-4.6
