name: Build macOS App

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "构建分支 (e.g. release, new-test, feature/xxx)"
        required: true
        type: string
        default: "new-test"
      env:
        description: "选择构建环境"
        required: true
        type: choice
        options:
          - "prod"
          - "test"
          - "dev"
        default: "test"
      package:
        description: "选择要构建的应用端"
        required: true
        type: choice
        options:
          - all
          - pos
          - assistant
          - kds
          - tablet
          - shop
        default: "all"
      base_url:
        description: "选择API基础URL"
        required: true
        type: choice
        default: "https://ttpos-test1.ttpos.com/api/v1"
        options:
          - "https://ttpos-test1.ttpos.com/api/v1"
          - "https://api.ttpos.com/api/v1"
          - "https://ttpos-pro.keli.vip/api/v1"
      base_ws_url:
        description: "选择WebSocket基础URL"
        required: true
        type: choice
        default: "wss://ttpos-test1.ttpos.com/ws"
        options:
          - "wss://ttpos-test1.ttpos.com/ws"
          - "wss://api.ttpos.com/ws"
          - "wss://ttpos-pro.keli.vip/ws"
      scp:
        description: "是否启用SCP传输"
        required: true
        default: "off"
        type: choice
        options:
          - "on"
          - "off"
      faynosync:
        description: "是否上传到 FaynoSync"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        package: [pos, assistant, kds, tablet, shop]
        include:
          - package: pos
            app_name: TTPOS
            vol_name: "TTPOS"
            gcs_folder: Cashier
            faynosync_name: "TTPOS"
          - package: assistant
            app_name: TTPOS-Go
            vol_name: "TTPOS Go"
            gcs_folder: Assistant
            faynosync_name: "TTPOS Go"
          - package: kds
            app_name: TTPOS-Kitchen
            vol_name: "TTPOS Kitchen"
            gcs_folder: Kitchen
            faynosync_name: "TTPOS Kitchen"
          - package: tablet
            app_name: TTPOS-Menu
            vol_name: "TTPOS Menu"
            gcs_folder: Menu
            faynosync_name: "TTPOS Menu"
          - package: shop
            app_name: TTPOS-Shop
            vol_name: "TTPOS Shop"
            gcs_folder: Shop
            faynosync_name: "TTPOS Shop"
    env:
      GCS_PATH: ${{ inputs.branch == 'release' && format('dc_apk/TTPOS/Prod/MacOS/{0}/', matrix.gcs_folder) || format('dc_apk/TTPOS/Test/MacOS/{0}/', matrix.gcs_folder) }}
      SCP_S_PATH: ${{ inputs.branch == 'release' && format('/hitosea/ttpos-apk/Prod/{0}/', matrix.package) || format('/hitosea/ttpos-apk/Test/{0}/', matrix.package) }}
      SCP_D_PATH: ${{ inputs.branch == 'release' && format('/root/web/web/restant/out/downloads/MacOS/{0}/', matrix.gcs_folder) || format('/root/web/web/restant/out/downloads/MacOS/Test/{0}/', matrix.gcs_folder) }}
    steps:
      - name: 检查是否需要构建此应用端
        id: check
        run: |
          if [ "${{ inputs.package }}" = "all" ] || [ "${{ inputs.package }}" = "${{ matrix.package }}" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "跳过 ${{ matrix.package }} (选择的应用端: ${{ inputs.package }})"
          fi

      - name: 显示构建信息
        if: steps.check.outputs.should_run == 'true'
        run: |
          echo "========================================="
          echo "macOS 构建信息"
          echo "========================================="
          echo "应用端: ${{ matrix.package }}"
          echo "分支: ${{ inputs.branch }}"
          echo "环境: ${{ inputs.env }}"
          echo "API URL: ${{ inputs.base_url }}"
          echo "WebSocket URL: ${{ inputs.base_ws_url }}"
          echo "SCP传输: ${{ inputs.scp }}"
          echo "========================================="

      - name: Checkout the code
        if: steps.check.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: innet8/ttpos-flutter
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          ref: ${{ inputs.branch }}

      # ========== macOS 签名准备 ==========

      - name: 配置 App Store Connect 登录
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD}" ] || [ -z "${APPLE_TEAM_ID}" ]; then
            echo "缺少 App Store Connect 登录所需凭据, 跳过登录"
            exit 0
          fi
          echo "LOGGED_IN_WITH_APPLE_ID=true" >> "$GITHUB_ENV"

      - name: 创建临时钥匙串并导入证书
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        env:
          MAC_SIGNING_CERT_BASE64: ${{ secrets.MAC_SIGNING_CERT_BASE64 }}
          MAC_SIGNING_CERT_PASSWORD: ${{ secrets.MAC_SIGNING_CERT_PASSWORD }}
          MAC_KEYCHAIN_PASSWORD: ${{ secrets.MAC_KEYCHAIN_PASSWORD || 'github-actions-secure-2024' }}
        run: |
          set -euo pipefail

          if [ -z "${MAC_SIGNING_CERT_BASE64}" ] || [ -z "${MAC_SIGNING_CERT_PASSWORD}" ]; then
            echo "错误: 缺少必要的证书 Secrets"
            echo "请确保配置了以下 Secrets:"
            echo "- MAC_SIGNING_CERT_BASE64: .p12 证书的 Base64 编码"
            echo "- MAC_SIGNING_CERT_PASSWORD: .p12 证书的密码"
            exit 1
          fi

          KEYCHAIN_PASSWORD="${MAC_KEYCHAIN_PASSWORD}"
          KEYCHAIN_PATH="$RUNNER_TEMP/mac-signing.keychain-db"

          echo "创建临时钥匙串: $KEYCHAIN_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

          CERT_PATH="$RUNNER_TEMP/developer_id_cert.p12"
          echo "解码并导入证书..."
          echo "$MAC_SIGNING_CERT_BASE64" | base64 --decode > "$CERT_PATH"

          security import "$CERT_PATH" -P "$MAC_SIGNING_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "验证导入的证书:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MAC_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          echo "证书导入完成!"

      - name: 安装开发描述文件
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        env:
          MAC_POS_PROFILE_BASE64: ${{ secrets.MAC_POS_PROFILE_BASE64 }}
          MAC_ASSISTANT_PROFILE_BASE64: ${{ secrets.MAC_ASSISTANT_PROFILE_BASE64 }}
          MAC_KDS_PROFILE_BASE64: ${{ secrets.MAC_KDS_PROFILE_BASE64 }}
          MAC_TABLET_PROFILE_BASE64: ${{ secrets.MAC_TABLET_PROFILE_BASE64 }}
          MAC_SHOP_PROFILE_BASE64: ${{ secrets.MAC_SHOP_PROFILE_BASE64 }}
        run: |
          set -e
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          pkg="${{ matrix.package }}"
          VAR_NAME="MAC_$(echo "$pkg" | tr '[:lower:]' '[:upper:]')_PROFILE_BASE64"
          PROFILE_VALUE="${!VAR_NAME}"

          if [ -z "$PROFILE_VALUE" ]; then
            echo "未配置 ${VAR_NAME}, 跳过描述文件安装"
            exit 0
          fi

          PROFILE_PATH="$RUNNER_TEMP/mac_${pkg}_profile.provisionprofile"
          PLIST_PATH="$RUNNER_TEMP/mac_${pkg}_profile.plist"
          echo "$PROFILE_VALUE" | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PLIST_PATH"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PLIST_PATH" 2>/dev/null || true)
          if [ -z "$PROFILE_UUID" ]; then
            echo "无法解析描述文件 UUID, 文件可能损坏"
            exit 1
          fi
          cp "$PROFILE_PATH" "$PROFILE_DIR/${PROFILE_UUID}.provisionprofile"
          echo "已安装 ${pkg} 的描述文件 (${PROFILE_UUID})"
          ls -l "$PROFILE_DIR" || echo "(未检测到任何文件)"

      - name: 设置默认钥匙串
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        run: |
          if [ -z "${KEYCHAIN_PATH:-}" ]; then
            echo "缺少 KEYCHAIN_PATH" >&2
            exit 1
          fi
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${MAC_KEYCHAIN_PASSWORD:-github-actions-secure-2024}" "$KEYCHAIN_PATH"

      # ========== Flutter 环境 ==========

      - name: Setup Flutter
        if: steps.check.outputs.should_run == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.3"
          channel: stable
          cache: true

      - name: Enable macOS desktop
        if: steps.check.outputs.should_run == 'true'
        run: flutter config --enable-macos-desktop

      - name: Precache Flutter artifacts
        if: steps.check.outputs.should_run == 'true'
        run: flutter precache --macos

      - name: Install Melos
        if: steps.check.outputs.should_run == 'true'
        run: |
          flutter --version
          dart pub global activate melos

      - name: Melos Init
        if: steps.check.outputs.should_run == 'true'
        env:
          PUB_HOSTED_URL: https://pub.flutter-io.cn
          FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
        run: |
          melos run init
          melos bs
          melos run env:setup -- --env=${{ inputs.env }} --file=${{ inputs.env }}
          brew install automake libtool

      # ========== 环境变量配置 ==========

      - name: 生成环境变量文件
        if: steps.check.outputs.should_run == 'true'
        env:
          API_URL: ${{ inputs.base_url }}
          WS_URL: ${{ inputs.base_ws_url }}
        run: |
          case "${{ inputs.env }}" in
            dev)  ENV_SUFFIX="development" ;;
            test) ENV_SUFFIX="test" ;;
            *)    ENV_SUFFIX="production" ;;
          esac

          ENV_PATH="apps/${{ matrix.package }}/.env.${ENV_SUFFIX}.local"
          ENV_TEMPLATE="apps/${{ matrix.package }}/.env.${ENV_SUFFIX}"

          if [ ! -f "$ENV_PATH" ]; then
            if [ -f "$ENV_TEMPLATE" ]; then
              cp "$ENV_TEMPLATE" "$ENV_PATH"
            else
              touch "$ENV_PATH"
            fi
          fi

          sed -i '' "s|^API_BASE_URL=.*|API_BASE_URL=${API_URL}|" "$ENV_PATH"
          sed -i '' "s|^WS_BASE_URL=.*|WS_BASE_URL=${WS_URL}|" "$ENV_PATH"

          echo "ENV_SUFFIX=$ENV_SUFFIX" >> $GITHUB_ENV

          echo "--- 环境变量文件内容 ($ENV_PATH) ---"
          cat "$ENV_PATH"

      - name: 设置 SENTRY_DSN(仅 release 分支)
        if: steps.check.outputs.should_run == 'true' && inputs.branch == 'release'
        env:
          SENTRYDSN_POS: ${{ secrets.SENTRYDSN_POS }}
          SENTRYDSN_KDS: ${{ secrets.SENTRYDSN_KDS }}
          SENTRYDSN_ASSISTANT: ${{ secrets.SENTRYDSN_ASSISTANT }}
          SENTRYDSN_TABLET: ${{ secrets.SENTRYDSN_TABLET }}
          SENTRYDSN_SHOP: ${{ secrets.SENTRYDSN_SHOP }}
        run: |
          ENV_PATH="apps/${{ matrix.package }}/.env.${{ env.ENV_SUFFIX }}.local"
          case "${{ matrix.package }}" in
            pos)       DSN="$SENTRYDSN_POS" ;;
            assistant) DSN="$SENTRYDSN_ASSISTANT" ;;
            tablet)    DSN="$SENTRYDSN_TABLET" ;;
            kds)       DSN="$SENTRYDSN_KDS" ;;
            shop)      DSN="$SENTRYDSN_SHOP" ;;
          esac
          sed -i '' "s|^SENTRY_DSN=.*|SENTRY_DSN=${DSN}|" "$ENV_PATH"

      - name: 设置环境变量
        if: steps.check.outputs.should_run == 'true'
        run: |
          VERSION=$(awk '/version:/ {print $2}' apps/${{ matrix.package }}/pubspec.yaml | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_DMG=${{ matrix.app_name }}-${VERSION}.dmg" >> $GITHUB_ENV
          echo "LATEST_NAME=${{ matrix.app_name }}-latest.dmg" >> $GITHUB_ENV

      # ========== macOS 签名身份 ==========

      - name: 获取签名身份
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        env:
          MAC_SIGNING_TEAM_ID_SECRET: ${{ secrets.MAC_SIGNING_TEAM_ID }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          set -euo pipefail

          echo "获取可用的签名身份..."
          AVAILABLE_IDENTITIES=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1)
          if [ -z "$AVAILABLE_IDENTITIES" ]; then
            echo "错误: 在钥匙串中未找到 Developer ID Application 证书" >&2
            echo "可用的证书列表:"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          SIGNING_IDENTITY=$(echo "$AVAILABLE_IDENTITIES" | sed 's/.*"\(.*\)".*/\1/')
          TEAM_ID="${MAC_SIGNING_TEAM_ID_SECRET:-N278MM4R33}"

          echo "使用签名身份: $SIGNING_IDENTITY"
          echo "使用团队 ID: $TEAM_ID"

          echo "MAC_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "MAC_SIGNING_TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"

      # ========== 构建 ==========

      - name: 构建 macOS 应用
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        env:
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${KEYCHAIN_PATH}" ]; then
            echo "缺少 KEYCHAIN_PATH 环境变量" >&2
            exit 1
          fi
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${MAC_KEYCHAIN_PASSWORD:-github-actions}" "$KEYCHAIN_PATH"
          echo "构建应用: ${{ matrix.package }}"
          dart run ./scripts/build_mac.dart --env=${{ inputs.env }} --package=${{ matrix.package }}

      - name: 准备构建产物
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          BUILD_OUTPUT_DIR="apps/${{ matrix.package }}/build/macos/Build/Products/Release"
          if [ ! -d "$BUILD_OUTPUT_DIR" ]; then
            echo "未找到构建输出目录: $BUILD_OUTPUT_DIR" >&2
            exit 1
          fi
          APP_SOURCE=$(find "$BUILD_OUTPUT_DIR" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [ -z "$APP_SOURCE" ]; then
            echo "未在 $BUILD_OUTPUT_DIR 中找到 .app 文件" >&2
            ls -al "$BUILD_OUTPUT_DIR"
            exit 1
          fi
          TARGET_DIR="releases/${{ matrix.package }}/${{ env.VERSION }}"
          mkdir -p "$TARGET_DIR"
          TARGET_APP="$TARGET_DIR/${{ matrix.app_name }}-${{ env.VERSION }}.app"
          rm -rf "$TARGET_APP"
          cp -R "$APP_SOURCE" "$TARGET_APP"
          echo "TARGET_DIR=$TARGET_DIR" >> "$GITHUB_ENV"
          echo "APP_PATH=$TARGET_APP" >> "$GITHUB_ENV"
          echo "已复制应用到: $TARGET_APP"

      # ========== macOS 代码签名 + 打包 ==========

      - name: 代码签名 .app
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        env:
          MAC_SIGNING_IDENTITY: ${{ env.MAC_SIGNING_IDENTITY }}
          MAC_SIGNING_ENTITLEMENTS: ${{ secrets.MAC_SIGNING_ENTITLEMENTS_PATH }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${MAC_SIGNING_IDENTITY}" ]; then
            echo "错误: 未配置签名标识 MAC_SIGNING_IDENTITY" >&2
            exit 1
          fi

          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${MAC_KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"

          sign_app() {
            local package="$1"
            local app_path="$2"

            echo "开始签名 $package 应用: $app_path"

            local entitlements_path="${MAC_SIGNING_ENTITLEMENTS:-apps/${package}/macos/Runner/Release.entitlements}"
            if [ ! -f "$entitlements_path" ]; then
              local alternative_paths=(
                "apps/${package}/macos/Runner/DebugProfile.entitlements"
                "apps/${package}/macos/Runner/Release.entitlements"
              )

              for alt_path in "${alternative_paths[@]}"; do
                if [ -f "$alt_path" ]; then
                  entitlements_path="$alt_path"
                  echo "找到权限文件: $entitlements_path"
                  break
                fi
              done

              if [ ! -f "$entitlements_path" ]; then
                echo "警告: 未找到任何权限文件, 将使用默认权限"
                entitlements_path=""
              fi
            fi

            echo "使用签名身份: ${MAC_SIGNING_IDENTITY}"
            echo "权限文件: ${entitlements_path:-无}"

            echo "签名内部二进制文件..."

            if find "${app_path}" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.metallib" \) -print0 | grep -q .; then
              find "${app_path}" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.metallib" \) -print0 | while IFS= read -r -d '' ITEM; do
                echo "签名库文件: $ITEM"
                codesign --force --timestamp --options runtime --sign "$MAC_SIGNING_IDENTITY" "$ITEM"
              done
            else
              echo "未找到需要签名的库文件"
            fi

            echo "签名可执行文件..."
            find "${app_path}" -type f -perm +111 -exec file {} \; | grep -E "(Mach-O|executable)" | cut -d: -f1 | while read -r binary; do
              if [ -f "$binary" ]; then
                echo "签名可执行文件: $binary"
                codesign --force --timestamp --options runtime --sign "$MAC_SIGNING_IDENTITY" "$binary"
              fi
            done

            echo "签名应用包..."
            find "${app_path}" -name "*.app" -type d | while read -r app_bundle; do
              echo "签名应用包: $app_bundle"
              codesign --force --timestamp --options runtime --sign "$MAC_SIGNING_IDENTITY" "$app_bundle"
            done

            echo "签名 XPC 服务..."
            find "${app_path}" -name "*.xpc" -type d | while read -r xpc_bundle; do
              echo "签名 XPC 服务: $xpc_bundle"
              codesign --force --timestamp --options runtime --sign "$MAC_SIGNING_IDENTITY" "$xpc_bundle"
            done

            echo "签名框架..."
            if find "${app_path}" -type d -name "*.framework" -print0 | grep -q .; then
              find "${app_path}" -type d -name "*.framework" -print0 | while IFS= read -r -d '' FW; do
                echo "签名框架: $FW"
                codesign --force --timestamp --options runtime --sign "$MAC_SIGNING_IDENTITY" "$FW"
              done
            else
              echo "未找到需要签名的框架"
            fi

            echo "签名主应用..."
            if [ -n "$entitlements_path" ] && [ -f "$entitlements_path" ]; then
              echo "使用权限文件: $entitlements_path"
              codesign --force --timestamp --options runtime --entitlements "$entitlements_path" --sign "$MAC_SIGNING_IDENTITY" "$app_path"
            else
              echo "不使用权限文件进行签名"
              codesign --force --timestamp --options runtime --sign "$MAC_SIGNING_IDENTITY" "$app_path"
            fi

            echo "验证签名..."
            codesign --verify --deep --strict "$app_path"

            echo "$package 应用签名完成!"
          }

          sign_app "${{ matrix.package }}" "$APP_PATH"

      - name: 创建 DMG
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v create-dmg &> /dev/null; then
            echo "安装 create-dmg..."
            brew install create-dmg
          fi

          VERSION="${{ env.VERSION }}"
          APP_NAME="${{ matrix.vol_name }}"
          DMG_PREFIX="${{ matrix.app_name }}"
          DMG_NAME="${DMG_PREFIX}-${VERSION}.dmg"
          RELEASE_DIR="releases/${{ matrix.package }}/${VERSION}"

          window_size="800 400"
          window_pos="200 120"
          icon_size="100"
          app_icon_pos="200 190"
          drop_link_pos="600 185"

          echo "正在为 ${{ matrix.package }} 创建 DMG..."

          pushd "$RELEASE_DIR" > /dev/null

          current_app=$(find . -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$current_app" ]; then
             echo "错误: 未找到 .app 文件"
             exit 1
          fi

          if [ "$(basename "$current_app")" != "${APP_NAME}.app" ]; then
             echo "重命名 $(basename "$current_app") -> ${APP_NAME}.app"
             mv "$current_app" "${APP_NAME}.app"
          fi

          rm -f "$DMG_NAME"

          create-dmg \
            --volname "${APP_NAME}" \
            --volicon "${APP_NAME}.app/Contents/Resources/AppIcon.icns" \
            --window-pos ${window_pos} \
            --window-size ${window_size} \
            --icon-size "${icon_size}" \
            --icon "${APP_NAME}.app" ${app_icon_pos} \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link ${drop_link_pos} \
            "${DMG_NAME}" \
            "${APP_NAME}.app"

          result=$?
          popd > /dev/null

          if [ $result -eq 0 ]; then
             full_dmg_path="${RELEASE_DIR}/${DMG_NAME}"
             echo "DMG 创建成功: $full_dmg_path"
             echo "DMG_PATH=$full_dmg_path" >> "$GITHUB_ENV"
          else
             echo "DMG 创建失败"
             exit 1
          fi

      - name: 签名 DMG
        if: steps.check.outputs.should_run == 'true'
        shell: bash
        env:
          MAC_SIGNING_IDENTITY: ${{ env.MAC_SIGNING_IDENTITY }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
        run: |
          set -euo pipefail

          if [ -z "${MAC_SIGNING_IDENTITY}" ]; then
            echo "未配置签名标识 MAC_SIGNING_IDENTITY" >&2
            exit 1
          fi

          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${MAC_KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"

          echo "开始签名 ${{ matrix.package }} DMG: $DMG_PATH"
          echo "使用签名身份: ${MAC_SIGNING_IDENTITY}"

          codesign --force --sign "$MAC_SIGNING_IDENTITY" "$DMG_PATH"

          echo "验证 ${{ matrix.package }} DMG 签名..."
          codesign --verify "$DMG_PATH"

          echo ""
          echo "${{ matrix.package }} DMG 签名信息:"
          codesign -dvv "$DMG_PATH" 2>&1 | head -20 || true

      - name: 判断是否需要公证
        if: steps.check.outputs.should_run == 'true'
        id: notarize_flag
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -n "${APPLE_ID}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
            echo "APPLE_NOTARIZE=true" >> "$GITHUB_ENV"
            echo "need_notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "APPLE_NOTARIZE=false" >> "$GITHUB_ENV"
            echo "need_notarize=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 公证 DMG (可选)
        if: steps.check.outputs.should_run == 'true' && env.APPLE_NOTARIZE == 'true'
        continue-on-error: true
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set +e

          echo "开始公证 DMG..."
          echo "Apple ID: ${APPLE_ID}"
          echo "Team ID: ${APPLE_TEAM_ID}"

          if [ -z "${APPLE_ID}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD}" ] || [ -z "${APPLE_TEAM_ID}" ]; then
            echo "警告: Apple 公证凭据不完整, 跳过公证"
            exit 0
          fi

          echo "正在提交公证请求..."
          xcrun notarytool submit "$DMG_PATH" --wait --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" > /tmp/notary_output.txt 2>&1
          NOTARIZE_RESULT=$?

          if [ $NOTARIZE_RESULT -eq 0 ]; then
            NOTARIZE_STATUS=$(grep -i "status:" /tmp/notary_output.txt | tail -1 | awk '{print $NF}')

            if [ "$NOTARIZE_STATUS" = "Accepted" ]; then
              echo "公证成功! 状态: $NOTARIZE_STATUS"
              echo "正在钉住公证票据..."
              xcrun stapler staple "$DMG_PATH"
              STAPLE_RESULT=$?

              if [ $STAPLE_RESULT -eq 0 ]; then
                echo "已成功钉住公证票据"
              else
                echo "钉住公证票据失败(退出代码: $STAPLE_RESULT)"
                echo "应用已公证, 但未钉住票据"
              fi
            else
              echo "公证被拒绝或失败"
              echo "公证状态: $NOTARIZE_STATUS"
              echo "完整输出:"
              cat /tmp/notary_output.txt

              SUBMISSION_ID=$(grep "id:" /tmp/notary_output.txt | head -1 | awk '{print $2}')
              if [ -n "$SUBMISSION_ID" ]; then
                echo ""
                echo "==========================================="
                echo "查询详细公证日志 (Submission ID: $SUBMISSION_ID)"
                echo "==========================================="
                xcrun notarytool log "$SUBMISSION_ID" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" || true
                echo "==========================================="
              fi

              echo ""
              echo "应用已构建并签名, 但未通过 Apple 公证"
              echo "未公证的应用仍可运行, 但首次启动时需要用户信任"
            fi
          else
            echo "公证提交失败(退出代码: $NOTARIZE_RESULT)"
            echo "完整输出:"
            cat /tmp/notary_output.txt
            echo ""
            echo "这可能是由于："
            echo "1. App 专用密码无效"
            echo "2. Apple ID 或 Team ID 错误"
            echo "3. 网络问题"
            echo "4. DMG 签名问题"
            echo ""
            echo "应用已构建并签名, 但不包含 Apple 公证"
            echo "未公证的应用仍可运行, 但首次启动时需要用户信任"
          fi

          rm -f /tmp/notary_output.txt

      # ========== 分发 ==========

      - name: 上传构建产物到 Artifact
        if: steps.check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.app_name }}-${{ env.VERSION }}
          path: ${{ env.DMG_PATH }}
          retention-days: 7
          compression-level: 0

      - name: SCP-UPLOAD
        if: steps.check.outputs.should_run == 'true' && inputs.scp == 'on'
        uses: Comori/ssh@v0.0.7
        with:
          host: ${{ secrets.SCP_S_HOST }}
          username: ${{ secrets.SCP_S_USER }}
          privateKey: ${{ secrets.SCP_S_RIVATEKEY }}
          command: |
            scp ${{ env.SCP_S_PATH }}${{ env.VERSION_DMG }} ${{ secrets.SCP_D_USER }}@${{ secrets.SCP_D_HOST }}:${{ env.SCP_D_PATH }}
          sourceFiles: |
            ${{ env.DMG_PATH }}
          targetDir: ${{ env.SCP_S_PATH }}
          scpFirst: true

      - name: Create latest symlink
        if: steps.check.outputs.should_run == 'true' && inputs.scp == 'on'
        uses: Comori/ssh@v0.0.7
        with:
          host: ${{ secrets.SCP_S_HOST }}
          username: ${{ secrets.SCP_S_USER }}
          privateKey: ${{ secrets.SCP_S_RIVATEKEY }}
          command: |
            ssh -o StrictHostKeyChecking=no ${{ secrets.SCP_D_USER }}@${{ secrets.SCP_D_HOST }} "cd ${{ env.SCP_D_PATH }} && ln -sf ${{ env.VERSION_DMG }} ${{ env.LATEST_NAME }}"
            echo "Created symlink: ${{ env.LATEST_NAME }} -> ${{ env.VERSION_DMG }}"

      - name: Upload to Google Cloud Storage
        if: steps.check.outputs.should_run == 'true' && inputs.scp == 'on'
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GOOGLE_STORAGE_CREDENTIALS }}"

      - name: 上传构建产物到 Google Cloud Storage
        if: steps.check.outputs.should_run == 'true' && inputs.scp == 'on'
        uses: "google-github-actions/upload-cloud-storage@v2"
        with:
          path: ${{ env.DMG_PATH }}
          destination: ${{ env.GCS_PATH }}
          parent: false

      - name: 上传到 FaynoSync
        if: steps.check.outputs.should_run == 'true' && inputs.faynosync == true
        continue-on-error: true
        env:
          FAYNOSYNC_URL: ${{ secrets.FAYNOSYNC_URL }}
          FAYNOSYNC_TOKEN: ${{ secrets.FAYNOSYNC_TOKEN }}
        run: |
          if [ ! -f "$DMG_PATH" ]; then
            echo "构建产物不存在，跳过 FaynoSync 上传"
            exit 0
          fi

          if [ -z "$FAYNOSYNC_URL" ] || [ -z "$FAYNOSYNC_TOKEN" ]; then
            echo "未配置 FAYNOSYNC_URL 或 FAYNOSYNC_TOKEN，跳过上传"
            exit 0
          fi

          CHANNEL="${{ inputs.env }}"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            FS_ARCH="amd64"
          else
            FS_ARCH="arm64"
          fi

          echo "上传到 FaynoSync: ${{ matrix.faynosync_name }} v${{ env.VERSION }} (${CHANNEL}/macos/${FS_ARCH})"
          curl -f -X POST "${FAYNOSYNC_URL}/upload" \
            -H "Authorization: Bearer ${FAYNOSYNC_TOKEN}" \
            -F "file=@${DMG_PATH}" \
            -F "data={\"app_name\":\"${{ matrix.faynosync_name }}\",\"version\":\"${{ env.VERSION }}\",\"channel\":\"${CHANNEL}\",\"publish\":false,\"critical\":false,\"platform\":\"macos\",\"arch\":\"${FS_ARCH}\",\"changelog\":\"Build from ${{ inputs.branch }}\"}"
          echo "FaynoSync 上传完成"

      - name: 构建完成总结
        if: always() && steps.check.outputs.should_run == 'true'
        run: |
          echo "========================================="
          echo "构建任务完成"
          echo "========================================="
          echo "应用端: ${{ matrix.package }}"
          echo "版本: ${{ env.VERSION }}"
          echo "分支: ${{ inputs.branch }}"
          echo "环境: ${{ inputs.env }}"
          echo "========================================="
